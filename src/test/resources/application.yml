spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  cors:
    allowed-origins: http://localhost:3000
  mail:
    enabled: false
  auth:
    jwt:
      issuer: fleetscore
      secret: test-very-long-secret-key-for-tests-only-0123456789
      access-ttl-min: 15
      refresh-ttl-days: 7
    reset-ttl-min: 30
    refresh:
      cookie-name: refresh_token
      cookie-secure: false
      cookie-samesite: Lax
      cookie-domain: ""
